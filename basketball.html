<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GameIntel — Basketball Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body class="dashboard-page">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="topbar-brand" style="text-decoration:none">GameIntel</a>
      <nav class="topbar-nav">
        <a href="dashboard.html">Home</a>
        <a href="basketball.html" class="active">Basketball</a>
      </nav>
    </div>
    <div class="topbar-right">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-details">
          <span class="user-name" id="userName">User</span>
          <span class="user-email" id="userEmail">user@org.com</span>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="dashboard-main">
    <div class="container">
      <div class="dashboard-header">
        <h2>🏀 Basketball — NBA Analytics</h2>
        <p class="text-muted">Choose your filters below, then view the report with those parameters applied.</p>
      </div>

      <!-- Filter Card -->
      <div class="filter-card">
        <!-- Date Range -->
        <div class="filter-section">
          <h3 class="filter-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Date Range
          </h3>
          <div class="date-inputs">
            <div class="form-group">
              <label for="filterDateStart">Start Date</label>
              <input type="date" id="filterDateStart" value="2025-10-21">
            </div>
            <div class="form-group">
              <label for="filterDateEnd">End Date</label>
              <input type="date" id="filterDateEnd" value="2026-04-12">
            </div>
          </div>
          <div class="quick-dates">
            <button class="chip" data-range="all">Select All</button>
            <button class="chip" data-range="next7">Next 7 Days</button>
            <button class="chip active" data-range="past">Past</button>
            <button class="chip" data-range="today">Today</button>
            <button class="chip" data-range="tomorrow">Tomorrow</button>
            <button class="chip" data-range="yesterday">Yesterday</button>
          </div>
        </div>

        <!-- Division -->
        <div class="filter-section">
          <h3 class="filter-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Division
          </h3>
          <div class="form-group">
            <select id="filterDivision">
              <option value="All">All Divisions</option>
            </select>
          </div>
        </div>

        <!-- Team -->
        <div class="filter-section">
          <h3 class="filter-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Team
          </h3>
          <div class="form-group">
            <select id="filterTeam">
              <option value="All">All Teams</option>
            </select>
          </div>
        </div>

        <!-- Player -->
        <div class="filter-section">
          <h3 class="filter-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Player
          </h3>
          <div class="form-group">
            <input type="text" id="filterPlayer" placeholder="Enter player name (optional)">
          </div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="filter-actions">
        <button class="btn btn-primary btn-lg" onclick="viewReport()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          View Report
        </button>
        <button class="btn btn-secondary btn-lg" onclick="resetFilters()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          Reset Filters
        </button>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/users.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
