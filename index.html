<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NBA MatchUP — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
</head>
<body class="login-page">

  <div class="login-container">
    <!-- Left panel - branding -->
    <div class="login-branding">
      <div class="login-branding-content">
        <div class="brand-logo">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="30" stroke="#fff" stroke-width="3"/>
            <path d="M32 2C32 2 32 62 32 62" stroke="#fff" stroke-width="2.5"/>
            <path d="M2 32C12 20 22 14 32 14C42 14 52 20 62 32" stroke="#fff" stroke-width="2.5" fill="none"/>
            <path d="M2 32C12 44 22 50 32 50C42 50 52 44 62 32" stroke="#fff" stroke-width="2.5" fill="none"/>
          </svg>
        </div>
        <h1>MatchUP</h1>
        <p>NBA Analytics Dashboard</p>
        <div class="brand-stats">
          <div class="brand-stat">
            <span class="stat-number">30</span>
            <span class="stat-label">Teams</span>
          </div>
          <div class="brand-stat">
            <span class="stat-number">1162</span>
            <span class="stat-label">Games</span>
          </div>
          <div class="brand-stat">
            <span class="stat-number">653</span>
            <span class="stat-label">Players</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel - login form -->
    <div class="login-form-panel">
      <div class="login-form-content">
        <h2>Welcome back</h2>
        <p class="text-muted">Sign in to access your NBA MatchUP dashboard</p>

        <div id="loginError" class="login-error" style="display:none"></div>

        <form class="login-form" onsubmit="event.preventDefault(); signIn();">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <button id="loginBtn" type="submit" class="btn btn-primary btn-login">
            Sign In
          </button>
        </form>

        <div class="login-divider">
          <span>Authorized Users Only</span>
        </div>

        <p class="login-footer-text">
          Contact your administrator if you need access.
        </p>
      </div>
    </div>
  </div>

  <script src="js/users.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
