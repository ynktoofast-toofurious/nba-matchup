<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GameIntel - Basketball Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3C0;</text></svg>">
</head>
<body class="dashboard-page">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="topbar-brand" style="text-decoration:none">GameIntel</a>
      <nav class="topbar-nav">
        <a href="dashboard.html">Home</a>
        <a href="basketball.html" class="active">Basketball</a>
      </nav>
    </div>
    <div class="topbar-right">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-details">
          <span class="user-name" id="userName">User</span>
          <span class="user-email" id="userEmail">user@org.com</span>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="dashboard-main">
    <div class="container">
      <div class="dashboard-header">
        <h2><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2" style="vertical-align:middle;margin-right:8px"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/></svg>Basketball - NBA Analytics</h2>
        <p class="text-muted">Choose your filters below, or describe what you want to see using the AI prompt.</p>
      </div>

      <!-- AI Prompt Bar -->
      <div class="prompt-card">
        <div class="prompt-header">
          <div class="prompt-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 2-2 3-2 5h-4c0-2-2-3-2-5a4 4 0 0 1 4-4z"/><line x1="10" y1="17" x2="14" y2="17"/><line x1="10" y1="20" x2="14" y2="20"/></svg></div>
          <div>
            <h3>AI Filter Assistant</h3>
            <p class="text-muted">Ask questions about teams, divisions, or players — get answers from the semantic model with filter logic</p>
          </div>
        </div>
        <form class="prompt-form" onsubmit="event.preventDefault(); processPrompt();">
          <div class="prompt-input-wrap">
            <input type="text" id="promptInput" placeholder='Try: "Lakers games last week" or "LeBron James in the Pacific division"' autocomplete="off">
            <button type="submit" class="btn btn-primary prompt-submit" id="promptBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Generate
            </button>
          </div>
        </form>
        <div id="promptResult" class="prompt-result" style="display:none"></div>
        <div class="prompt-examples">
          <span class="text-muted" style="font-size:.75rem">Try asking:</span>
          <button class="prompt-example-chip" onclick="fillPrompt('How are the Lakers doing this season?')">Lakers season stats</button>
          <button class="prompt-example-chip" onclick="fillPrompt('Show me the Pacific division standings')">Pacific division</button>
          <button class="prompt-example-chip" onclick="fillPrompt('Best teams in the league by win rate')">Top teams</button>
          <button class="prompt-example-chip" onclick="fillPrompt('Boston Celtics home vs away record')">Celtics home/away</button>
          <button class="prompt-example-chip" onclick="fillPrompt('LeBron James last 7 days')">LeBron last 7 days</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/users.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/semantic-ai.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
