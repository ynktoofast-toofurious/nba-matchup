<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GameIntel - Basketball Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3C0;</text></svg>">
</head>
<body class="report-page">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="basketball.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <a href="dashboard.html" class="topbar-brand" style="text-decoration:none">GameIntel</a>
      <span class="topbar-title" style="opacity:.6;font-weight:500;font-size:.875rem;margin-left:.25rem">/ Basketball Report</span>
    </div>
    <div class="topbar-right">
      <span class="user-name" id="userName">User</span>
      <a href="basketball.html" class="btn btn-secondary">Change Filters</a>
      <button class="btn btn-ghost" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <!-- Report layout: guide panel + dashboard -->
  <div class="report-layout">

    <!-- Left: AI Assistant + Filter Guide Panel (25%) -->
    <aside class="filter-guide" id="filterGuide">
      <div class="guide-header">
        <div class="guide-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 2-2 3-2 5h-4c0-2-2-3-2-5a4 4 0 0 1 4-4z"/><line x1="10" y1="17" x2="14" y2="17"/><line x1="10" y1="20" x2="14" y2="20"/></svg>
        </div>
        <h3>AI Assistant</h3>
        <p class="text-muted">Ask questions about the data or get filter guidance</p>
      </div>

      <!-- Mini AI Prompt (on report page) -->
      <div class="guide-prompt">
        <form onsubmit="event.preventDefault(); processReportPrompt();">
          <div class="guide-prompt-wrap">
            <input type="text" id="reportPromptInput" placeholder="Ask about teams, players, measures..." autocomplete="off">
            <button type="submit" class="btn btn-primary guide-prompt-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </form>
        <div class="guide-prompt-chips">
          <button class="guide-chip" onclick="document.getElementById('reportPromptInput').value='What measures are available?';processReportPrompt()">Measures</button>
          <button class="guide-chip" onclick="document.getElementById('reportPromptInput').value='List all divisions';processReportPrompt()">Divisions</button>
          <button class="guide-chip" onclick="document.getElementById('reportPromptInput').value='What does Win Rate mean?';processReportPrompt()">Win Rate?</button>
          <button class="guide-chip" onclick="document.getElementById('reportPromptInput').value='Tell me about the semantic model';processReportPrompt()">Data Model</button>
        </div>
      </div>

      <div class="guide-steps" id="guideSteps">
        <!-- AI response + filter steps populated by JS -->
      </div>
      <div class="guide-footer">
        <a href="basketball.html" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Change Filters
        </a>
      </div>
    </aside>

    <!-- Right: Report embed area (75%) -->
    <main class="report-main">
      <div id="reportLoading" class="report-loading">
        <div class="loading-spinner"></div>
        <p>Loading Power BI Report...</p>
      </div>
      <div id="reportContainer" class="report-embed"></div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
  <script src="js/config.js?v=20260409"></script>
  <script src="js/users.js?v=20260409"></script>
  <script src="js/auth.js?v=20260409"></script>
  <script src="js/semantic-ai.js?v=20260409"></script>
  <script src="js/app.js?v=20260409"></script>
  <script src="js/powerbi.js?v=20260409"></script>
</body>
</html>
