<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GameIntel - Basketball Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3C0;</text></svg>">
</head>
<body class="report-page">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="basketball.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <a href="dashboard.html" class="topbar-brand" style="text-decoration:none">GameIntel</a>
      <span class="topbar-title" style="opacity:.6;font-weight:500;font-size:.875rem;margin-left:.25rem">/ Basketball Report</span>
    </div>
    <div class="topbar-right">
      <span class="user-name" id="userName">User</span>
      <a href="basketball.html" class="btn btn-secondary">Change Filters</a>
      <button class="btn btn-ghost" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <!-- Report layout: guide panel + dashboard -->
  <div class="report-layout">

    <!-- Left: Filter Guide Panel (25%) -->
    <aside class="filter-guide" id="filterGuide">
      <div class="guide-header">
        <div class="guide-icon">&#x1F3AF;</div>
        <h3>Filter Guide</h3>
        <p class="text-muted">Follow these steps to apply your filters</p>
      </div>
      <div class="guide-steps" id="guideSteps">
        <!-- Steps populated by JS from saved filters -->
      </div>
      <div class="guide-footer">
        <a href="basketball.html" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Change Filters
        </a>
      </div>
    </aside>

    <!-- Right: Report embed area (75%) -->
    <main class="report-main">
      <div id="reportLoading" class="report-loading">
        <div class="loading-spinner"></div>
        <p>Loading Power BI Report...</p>
      </div>
      <div id="reportContainer" class="report-embed"></div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
  <script src="js/config.js?v=20260408"></script>
  <script src="js/users.js?v=20260408"></script>
  <script src="js/auth.js?v=20260408"></script>
  <script src="js/powerbi.js?v=20260409"></script>
</body>
</html>
