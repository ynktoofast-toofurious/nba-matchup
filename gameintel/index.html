<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GameIntel ΓÇö Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3C0;</text></svg>">
</head>
<body class="login-page">

  <div class="login-container">
    <!-- Left panel - branding -->
    <div class="login-branding">
      <div class="login-branding-content">
        <div class="brand-logo">
          <div class="logo-glow"></div>
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="4" y="4" width="56" height="56" rx="14" stroke="url(#brandGrad)" stroke-width="3"/>
            <path d="M20 38L28 28L36 34L44 22" stroke="url(#brandGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="44" cy="22" r="4" fill="#00d4aa"/>
            <defs>
              <linearGradient id="brandGrad" x1="4" y1="4" x2="60" y2="60">
                <stop stop-color="#00d4aa"/><stop offset=".5" stop-color="#388bfd"/><stop offset="1" stop-color="#a371f7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>GameIntel</h1>
        <p class="tagline">One Platform. Every Sport. Smarter Insights.</p>
        <div class="brand-stats">
          <div class="brand-stat">
            <span class="stat-number">5+</span>
            <span class="stat-label">Sports</span>
          </div>
          <div class="brand-stat">
            <span class="stat-number">Live</span>
            <span class="stat-label">Analytics</span>
          </div>
          <div class="brand-stat">
            <span class="stat-number">AI</span>
            <span class="stat-label">Powered</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel - login form -->
    <div class="login-form-panel">
      <div class="login-form-content">
        <h2>Welcome back</h2>
        <p class="text-muted">Sign in to access your GameIntel dashboard</p>

        <div id="loginError" class="login-error" style="display:none"></div>

        <form class="login-form" onsubmit="event.preventDefault(); signIn();">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <button id="loginBtn" type="submit" class="btn btn-login">
            Sign In
          </button>
        </form>

        <div class="login-divider">
          <span>Authorized Users Only</span>
        </div>

        <p class="login-footer-text">
          Contact your administrator if you need access.
        </p>
      </div>
    </div>
  </div>

  <script src="js/users.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
